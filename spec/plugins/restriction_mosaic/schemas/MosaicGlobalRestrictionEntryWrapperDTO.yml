type: object
description: Wrapper object containing one mosaic global restriction entry.
required:
  - version
  - compositeHash
  - entryType
  - mosaicId
  - restrictions
properties:
  version:
    $ref: "../../../schemas/StateVersion.yml"
  compositeHash:
    description: Composite hash uniquely identifying the mosaic restriction entry.
    $ref: "../../../schemas/Hash256.yml"
  entryType:
    $ref: "./MosaicRestrictionEntryTypeEnum.yml"
  mosaicId:
    description: Mosaic identifier for which the restrictions are defined.
    $ref: "../../../schemas/MosaicId.yml"
  restrictions:
    description: Global restriction rules associated with the mosaic.
    type: array
    items:
      $ref: "./MosaicGlobalRestrictionEntryDTO.yml"
