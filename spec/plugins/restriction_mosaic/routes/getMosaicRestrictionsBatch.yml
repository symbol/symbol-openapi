tags:
  - Restriction Mosaic routes
summary: Get mosaic restrictions for an array of composite hashes
description: Gets an array of mosaic restrictions for the given composite hashes.
operationId: getMosaicRestrictionsBatch
requestBody:
  $ref: "../../../request_bodies/compositeHashes.yml"
responses:
  "200":
    description: success
    content:
      application/json:
        schema:
          type: array
          description: Array of mosaic restriction entries.
          items:
            $ref: "../schemas/MosaicRestrictionDTO.yml"
  "400":
    $ref : "../../../responses/InvalidContent.yml"
  "409":
    $ref : "../../../responses/InvalidArgument.yml"
