tags:
  - Restriction Mosaic routes
summary: Get mosaic restrictions Merkle information
description: |
  Returns the Merkle state proof for the mosaic restriction entry associated with the given composite hash.
  If no mosaic restriction entry exists for the supplied composite hash, the endpoint still returns
  a Merkle proof response, but it is a negative proof showing that no mosaic restriction state entry
  exists for the requested composite hash.
operationId: getMosaicRestrictionsMerkle
parameters:
  - $ref: "../../../parameters/path/compositeHashPath.yml"
responses:
  "200":
    description: Merkle proof for the requested mosaic restriction entry.
    content:
      application/json:
        schema:
          $ref: "../../../schemas/MerkleStateInfoDTO.yml"
        examples:
