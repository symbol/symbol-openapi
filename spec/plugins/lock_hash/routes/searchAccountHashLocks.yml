tags:
  - Hash Lock routes
summary: Search hash lock entries by account
description: Returns a paginated list of hash lock entries created by the given account address.
operationId: searchAccountHashLocks
parameters:
  - $ref: "../../../parameters/path/addressPath.yml"
  - $ref: "../../../parameters/query/pageSizeQuery.yml"
  - $ref: "../../../parameters/query/pageNumberQuery.yml"
  - $ref: "../../../parameters/query/offsetQuery.yml"
  - $ref: "../../../parameters/query/orderQuery.yml"
responses:
  "200":
    description: Paginated list of hash lock entries for the requested account.
    content:
      application/json:
        schema:
          $ref: "../schemas/HashLockPage.yml"
        examples:
          default:
            summary: Account hash lock page example
            value:
              data:
                - lock:
                    version: 1
                    ownerAddress: "98F003E1C174E04338C5D436BC7AFB8866A03C0FD7B226E6"
                    mosaicId: "72C0212E67A08BCE"
                    amount: "10000000"
                    endHeight: "1946240"
                    status: 1
                    hash: "E864E2CC4345D1A8CBB05FDCE87F6500D7F1FE557856CB06990CFC82A238421A"
                  id: "69C45B7239C3F3DF2942F2B9"
              pagination:
                pageNumber: 1
                pageSize: 10
  "409":
    $ref : "../../../responses/InvalidArgument.yml"
