type: object
properties:
  lockedFundsPerAggregate:
    type: string # Amount
    description: Amount that has to be locked per aggregate in partial cache.
    examples:
      - "10'000'000"
  maxHashLockDuration:
    type: string # utils::BlockSpan
    description: Maximum number of blocks for which a hash lock can exist.
    examples:
      - 2d
