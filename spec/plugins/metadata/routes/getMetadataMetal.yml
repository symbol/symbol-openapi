tags:
  - Metadata routes
summary: Get Metal metadata binary data
description: |
  Returns the decoded binary payload stored in Metal metadata entries identified by the given metal id.
  Metal is a convention for storing chunked binary payloads in metadata entries. See the
  [metal-on-symbol repository](https://github.com/OPENSPHERE-Inc/metal-on-symbol).
  The response content type is derived from the stored Metal seal when available, or defaults to
  `application/octet-stream`. Optional query parameters can override the response headers for
  content type and filename.
operationId: getMetadataMetal
parameters:
  - $ref: "../../../parameters/path/metalIdPath.yml"
  - name: mimeType
    in: query
    description: Override the MIME type of the response.
    required: false
    schema:
      type: string
    examples:
      png:
        value: "image/png"
      plainText:
        value: "text/plain"
  - name: fileName
    in: query
    description: Override the filename in the Content-Disposition header.
    required: false
    schema:
      type: string
  - name: download
    in: query
    description: When true, sets Content-Disposition to attachment.
    required: false
    schema:
      type: boolean
      default: false
responses:
  "200":
    description: Binary payload of the Metal metadata.
    headers:
      Content-Disposition:
        description: |
          Indicates whether the payload is returned inline or as an attachment and, when available,
          includes the resolved filename.
        schema:
          type: string
        examples:
          inlineSvg:
            value: 'inline; filename="metal-sample.svg"'
          attachmentSvg:
            value: 'attachment; filename="metal-sample.svg"'
      Content-MetalText:
        description: |
          Original decoded Metal seal text associated with the payload, when the payload was stored
          with a Metal seal.
        schema:
          type: string
        examples:
          svgSeal:
            value: '["seal1",384,"image/svg+xml","metal-sample.svg"]'
          textSeal:
            value: '["seal1",65,"text/plain","metal-sample.txt"]'
    content:
      "*/*":
        schema:
          type: string
          format: binary
