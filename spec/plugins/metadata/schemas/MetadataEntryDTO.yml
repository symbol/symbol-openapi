type: object
required:
  - version
  - compositeHash
  - sourceAddress
  - targetAddress
  - scopedMetadataKey
  - metadataType
  - valueSize
  - value
properties:
  version:
    $ref: "../../../schemas/StateVersion.yml"
  compositeHash:
    $ref: "../../../schemas/Hash256.yml"
  sourceAddress:
    $ref: "../../../schemas/AddressHex.yml"
  targetAddress:
    $ref: "../../../schemas/AddressHex.yml"
  scopedMetadataKey:
    $ref: "../../../schemas/MetadataKey.yml"
  targetId:
    anyOf:
      - $ref: "../../../schemas/MosaicId.yml"
      - $ref: "../../../schemas/NamespaceId.yml"
  metadataType:
    $ref: "./MetadataTypeEnum.yml"
  valueSize:
    type: integer
    description: Size of the metadata value in bytes.
    examples:
      - 6
  value:
    $ref: "../../../schemas/MetadataValue.yml"
