tags:
  - Transaction routes
summary: Announce a cosignature transaction
description: |
  Broadcasts a detached cosignature for an aggregate bonded transaction to the network through this node.

  The request must contain the detached cosignature fields: cosignature version, signer public key,
  cosignature signature, and the parent aggregate transaction hash.
  Detached cosignatures are normally created client-side with a [Symbol SDK](https://docs.symbol.dev/sdk.html)
  and then announced with this endpoint.

  Acceptance by this node does not mean the parent aggregate bonded transaction is already confirmed
  on-chain. The cosignature still needs to be propagated and processed by the network.

  To verify the effect of the cosignature, query the **parent aggregate bonded transaction**,
  for example with [`GET /transactionStatus/{hash}`](/transactionStatus/{hash}) using the
  parent aggregate transaction hash. Transaction status availability is not guaranteed indefinitely: failed statuses
  are stored in a capped collection and may be evicted as new entries arrive.
operationId: announceCosignatureTransaction
requestBody:
  $ref: "../../../request_bodies/cosignature.yml"
responses:
  "202":
    description: Detached cosignature accepted for processing and broadcast by the node.
    content:
      application/json:
        schema:
          $ref: "../../../core/transaction/schemas/AnnounceTransactionInfoDTO.yml"
        examples:
          success:
            summary: Cosignature packet pushed to the node
            value:
              message: "packet 257 was pushed to the network via /transactions/cosignature"
  "400":
    $ref: "../../../responses/InvalidContent.yml"
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
