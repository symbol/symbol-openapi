tags:
  - Transaction routes
summary: Announce an aggregate bonded transaction
description: |
  Broadcasts a signed aggregate bonded transaction to the network through this node.

  The request must contain the serialized aggregate bonded transaction payload in hexadecimal form.
  Transactions are normally created and signed client-side with a [Symbol SDK](https://docs.symbol.dev/sdk.html)
  and then announced with this endpoint.
  
  To verify the final result, query ``GET /transactionStatus/{hash}`` on the same node that received
  the announce request. If that node drops the transaction before propagation, other nodes may not
  know the transaction at all and can return ``404`` for the same hash.
operationId: announcePartialTransaction
requestBody:
  $ref: "../../../request_bodies/transactionPayload.yml"
responses:
  "202":
    description: Aggregate bonded transaction accepted for processing and broadcast by the node.
    content:
      application/json:
        schema:
          $ref: "../../../core/transaction/schemas/AnnounceTransactionInfoDTO.yml"
        examples:
          success:
            summary: Partial transaction packet pushed to the node
            value:
              message: "packet 256 was pushed to the network via /transactions/partial"
  "400":
    $ref: "../../../responses/InvalidContent.yml"
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
