type: object
description: Secret proof transaction body that reveals the proof needed to complete a secret lock.
required:
  - recipientAddress
  - secret
  - hashAlgorithm
  - proof
properties:
  recipientAddress:
    $ref: "../../../schemas/UnresolvedAddress.yml"
  secret:
    $ref: "../../../schemas/Hash256.yml"
  hashAlgorithm:
    $ref: "./LockHashAlgorithmEnum.yml"
  proof:
    type: string
    description: Proof data whose hash, using `hashAlgorithm`, must match `secret`.

