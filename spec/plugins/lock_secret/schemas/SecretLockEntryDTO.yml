type: object
description: |
  Locked mosaic funds that can be claimed by the recipient only after revealing a valid proof.
  If the proof is not revealed before the lock expires, the locked funds are returned to the sender.
required:
  - version
  - ownerAddress
  - mosaicId
  - amount
  - endHeight
  - status
  - hashAlgorithm
  - secret
  - recipientAddress
  - compositeHash
properties:
  version:
    $ref: "../../../schemas/StateVersion.yml"
  ownerAddress:
    $ref: "../../../schemas/AddressHex.yml"
    description: Address of the account that created the secret lock.
  mosaicId:
    $ref: "../../../schemas/MosaicId.yml"
    description: Identifier of the locked mosaic.
  amount:
    $ref: "../../../schemas/Amount.yml"
    description: Amount of locked mosaic units, expressed in the mosaic's smallest (atomic) unit.
  endHeight:
    $ref: "../../../schemas/Height.yml"
    description: Block height at which the secret lock expires if no valid proof is announced earlier.
  status:
    $ref: "../../../schemas/LockStatus.yml"
  hashAlgorithm:
    $ref: "./LockHashAlgorithmEnum.yml"
  secret:
    $ref: "../../../schemas/Secret.yml"
  recipientAddress:
    $ref: "../../../schemas/AddressHex.yml"
    description: Address of the account that can unlock the funds by announcing the matching proof.
  compositeHash:
    $ref: "../../../schemas/Hash256.yml"
    description: |
      Composite SHA3-256 hash derived from `secret` and `recipientAddress`.
      It uniquely identifies the secret lock entry and is computed automatically by the protocol;
      it is not supplied as a standalone field when announcing the secret lock transaction.
