tags:
  - Secret Lock routes
summary: Get secret lock information for an array of composite hashes
description: Returns secret lock entries associated with the given composite hashes.
operationId: getSecretLocks
requestBody:
  $ref: "../../../request_bodies/compositeHashes.yml"
responses:
  "200":
    description: Secret lock entries successfully retrieved.
    content:
      application/json:
        schema:
          type: array
          description: Secret lock entries matching the requested composite hashes.
          items:
            $ref: "../schemas/SecretLockInfoDTO.yml"
        examples:
          default:
            summary: Batch secret lock lookup example
            value:
              - lock:
                  version: 1
                  ownerAddress: "98AEC4846232C66C505953FDF65657034F17F4BB706227E0"
                  mosaicId: "72C0212E67A08BCE"
                  amount: "1000000"
                  endHeight: "3829680"
                  status: 1
                  hashAlgorithm: 0
                  secret: "62B397894D61C6D88C3B6E145A88D955844C3350D426592792AAC96EF133809D"
                  recipientAddress: "98B0162503A0065ED5FA7E59384CEA6078E549152BB4275E"
                  compositeHash: "C6BD4B47D8EBC5898CEE9B247270F9697C67BA8117F70C6FE7435154116849F4"
                id: "69BB8948D62324F29FD9DEC4"
  "400":
    $ref : "../../../responses/InvalidContent.yml"
  "409":
    $ref : "../../../responses/InvalidArgument.yml"
