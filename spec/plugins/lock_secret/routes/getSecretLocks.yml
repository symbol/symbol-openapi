          description: Array of secret lock information.
          items:
            $ref: "../schemas/SecretLockInfoDTO.yml"
  "400":
    $ref : "../../../responses/InvalidContent.yml"
  "409":
    $ref : "../../../responses/InvalidArgument.yml"
