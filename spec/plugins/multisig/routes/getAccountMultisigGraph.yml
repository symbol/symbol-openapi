tags:
  - Multisig routes
summary: Get multisig account graph information
description: |
  Returns the multisig graph centered on the requested account.

  Level `0` contains the requested account. Negative levels contain multisig accounts for which the
  queried account acts as a cosignatory. Positive levels contain multisig relationships discovered
  through the queried account's cosignatories.

  If the requested account is a cosignatory but is not itself managed as a multisig account, the
  response still includes level `0` for that account. In this case, the level `0` entry has
  `minApproval = 0`, `minRemoval = 0`, an empty `cosignatoryAddresses` array, and
  `multisigAddresses` listing the multisig accounts it can cosign.

  If the requested account is neither a multisig account nor a cosignatory of any multisig account,
  no multisig state entry exists for it and the endpoint returns `404`.

  If the requested account is itself a multisig account, the response includes its multisig state at
  level `0` together with any reachable negative and positive graph levels.
operationId: getAccountMultisigGraph
parameters:
  - $ref: "../../../parameters/path/addressPath.yml"
responses:
  "200":
    description: Multisig graph grouped by level around the requested account.
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: "../schemas/MultisigAccountGraphInfoDTO.yml"
        examples:
          multiLevel:
            summary: Multi-level multisig graph
            value:
              - level: 0
                multisigEntries:
                  - multisig:
                      version: 1
                      accountAddress: "688E494F708C25C4E4CE77B933FDA54E81EDE01F9BD9D7DD"
                      minApproval: 1
