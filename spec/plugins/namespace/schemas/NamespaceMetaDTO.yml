type: object
description: |
  Metadata about the namespace entry.
  Includes whether the namespace is currently active and its internal ordering index.
required:
  - active
  - index
properties:
  active:
    type: boolean
    description: Indicates whether the namespace is currently active at the chain height used to serve the request.
  index:
    type: integer
    minimum: 0
    description: Internal namespace index used by the server state cache and pagination logic.
