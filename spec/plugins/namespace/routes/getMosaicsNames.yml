tags:
  - Namespace routes
summary: Get readable names for a set of mosaics
description: |
  Resolves namespace names linked to mosaic identifiers.

  Submit an array of mosaic identifiers in the request body. For each requested
  mosaic, the response returns the namespace names currently linked to that mosaic.
operationId: getMosaicsNames
requestBody:
  $ref: "../../../request_bodies/mosaicIds.yml"
responses:
  "200":
    description: Mosaic names successfully resolved.
    content:
      application/json:
        schema:
          $ref: "../schemas/MosaicsNamesDTO.yml"
        examples:
          default:
            value:
              mosaicNames:
                - mosaicId: "6BED913FA20223F8"
                  names:
                    - "symbol.xym"
                - mosaicId: "0DC67FBE1CAD29E3"
                  names: []
  "400":
    $ref : "../../../responses/InvalidContent.yml"
  "409":
    $ref : "../../../responses/InvalidArgument.yml"
