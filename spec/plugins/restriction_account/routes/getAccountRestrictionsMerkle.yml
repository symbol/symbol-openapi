tags:
  - Restriction Account routes
summary: Get account restrictions Merkle information
description: Returns the Merkle state proof for the account restriction entry associated with the given account address.
operationId: getAccountRestrictionsMerkle
parameters:
  - $ref: "../../../parameters/path/addressPath.yml"
responses:
  "200":
    description: Merkle proof for the requested account restriction entry.
    content:
      application/json:
        schema:
          $ref: "../../../schemas/MerkleStateInfoDTO.yml"
  "404":
    $ref: "../../../responses/ResourceNotFound.yml"
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
