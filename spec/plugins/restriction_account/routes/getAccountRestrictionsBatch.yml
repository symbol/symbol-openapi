tags:
  - Restriction Account routes
summary: Get account restrictions for an array of addresses
description: Gets an array of account restrictions for the given addresses.
operationId: getAccountRestrictionsBatch
requestBody:
  $ref: "../../../request_bodies/addresses.yml"
responses:
  "200":
    description: success
    content:
      application/json:
        schema:
          type: array
          description: Array of account restrictions information.
          items:
            $ref: "../schemas/AccountRestrictionsInfoDTO.yml"
  "400":
    $ref : "../../../responses/InvalidContent.yml"
  "409":
    $ref : "../../../responses/InvalidArgument.yml"
