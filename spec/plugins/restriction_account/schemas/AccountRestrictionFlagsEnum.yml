type: integer
enum:
  - 1
  - 2
  - 16385
  - 16388
  - 32769
  - 32770
  - 49153
  - 49156
description: |
  The value is a **bitwise OR** of protocol flags (one **restriction type**, then optional modifiers):

  - **Restriction type** (pick one): **Address** `0x0001`, **MosaicId** `0x0002`, **TransactionType** `0x0004`.
  - **Outgoing** `0x4000` (optional): restriction applies to transactions **from** this account; omit it for **incoming**.
  - **Block** `0x8000` (optional): **block** listed values; omit it for **allow** lists.

  **Example:** block outgoing transactions of a given 
  type = `Block` + `Outgoing` + `TransactionType` -> `0x8000 | 0x4000 | 0x0004` = `0xC004` = **49156**.

  All values accepted on-chain (other OR combinations are rejected by the node):
  - `0x0001` (`1`): Allow only incoming transactions from a given address.
  - `0x0002` (`2`): Allow only incoming transactions containing a given mosaic ID.
  - `0x4001` (`16385`): Allow only outgoing transactions to a given address.
  - `0x4004` (`16388`): Allow only outgoing transactions with a given transaction type.
  - `0x8001` (`32769`): Block incoming transactions from a given address.
  - `0x8002` (`32770`): Block incoming transactions containing a given mosaic ID.
  - `0xC001` (`49153`): Block outgoing transactions to a given address.
  - `0xC004` (`49156`): Block outgoing transactions with a given transaction type.
examples:
  - 1
