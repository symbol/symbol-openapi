type: integer
enum:
  - 1
  - 2
  - 16385
  - 16388
  - 32769
  - 32770
  - 49153
  - 49156
description: |
  Account restriction flag combination:
  - `0x0001` (`1`): Allow only incoming transactions from a given address.
  - `0x0002` (`2`): Allow only incoming transactions containing a given mosaic ID.
  - `0x4001` (`16385`): Allow only outgoing transactions to a given address.
  - `0x4004` (`16388`): Allow only outgoing transactions with a given transaction type.
  - `0x8001` (`32769`): Block incoming transactions from a given address.
  - `0x8002` (`32770`): Block incoming transactions containing a given mosaic ID.
  - `0xC001` (`49153`): Block outgoing transactions to a given address.
  - `0xC004` (`49156`): Block outgoing transactions with a given transaction type.
examples:
  - 1
