type: object
description: Receipt emitted when new network currency mosaic units are created by inflation.
allOf:
  - $ref: "./ReceiptDTO.yml"
  - type: object
    required:
      - mosaicId
      - amount
    properties:
      mosaicId:
        $ref: "../../../schemas/MosaicId.yml"
        description: Identifier of the network currency mosaic created by inflation.
      amount:
        $ref: "../../../schemas/Amount.yml"
        description: Amount of mosaic units created by inflation, expressed in the mosaic's smallest (atomic) unit.
