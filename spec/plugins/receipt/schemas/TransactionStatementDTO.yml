type: object
description: Transaction statement containing receipts emitted by a transaction source at a given block height.
required:
  - height
  - source
  - receipts
properties:
  height:
    $ref: "../../../schemas/Height.yml"
    description: Height of the block that contains the statement.
  source:
    $ref: "./SourceDTO.yml"
  receipts:
    type: array
    description: Receipts emitted by the transaction source.
    items:
      anyOf:
        - $ref: "./BalanceTransferReceiptDTO.yml"
        - $ref: "./BalanceChangeReceiptDTO.yml"
        - $ref: "./NamespaceExpiryReceiptDTO.yml"
        - $ref: "./MosaicExpiryReceiptDTO.yml"
        - $ref: "./InflationReceiptDTO.yml"
