tags:
  - Receipt routes
summary: Search transaction statements
description: |
  Returns a paginated list of transaction statements generated while confirmed transactions
  change on-chain state.
  Each statement is grouped by block height and source and contains the receipts produced by
  transaction execution, including balance transfers, balance changes, expirations, and inflation.
  Results can be filtered by block height, receipt type, related addresses, and artifact IDs.
operationId: searchTransactionStatements
parameters:
  - $ref: "../../../parameters/query/heightQuery.yml"
  - $ref: "../../../parameters/query/fromHeightQuery.yml"
  - $ref: "../../../parameters/query/toHeightQuery.yml"
  - $ref: "../../../parameters/query/receiptTypesQuery.yml"
  - $ref: "../../../parameters/query/recipientAddressQuery.yml"
  - $ref: "../../../parameters/query/senderAddressQuery.yml"
  - $ref: "../../../parameters/query/targetAddressQuery.yml"
  - $ref: "../../../parameters/query/artifactIdQuery.yml"
  - $ref: "../../../parameters/query/pageSizeQuery.yml"
  - $ref: "../../../parameters/query/pageNumberQuery.yml"
  - $ref: "../../../parameters/query/offsetQuery.yml"
  - $ref: "../../../parameters/query/orderQuery.yml"
responses:
  "200":
    description: Paginated list of transaction statements.
    content:
      application/json:
        schema:
          $ref: "../schemas/TransactionStatementPage.yml"
        examples:
          default:
            summary: Transaction statement example
            value:
              data:
                - statement:
                    height: "5279411"
                    source:
                      primaryId: 0
                      secondaryId: 0
                    receipts:
                      - version: 1
                        type: 8515
                        targetAddress: "68EC4C4105860CD3D69D4E8FF6183C72EF46637EEAF360CF"
                        mosaicId: "6BED913FA20223F8"
                        amount: "75920799"
                      - version: 1
                        type: 8515
                        targetAddress: "682AE8CC97DA1E1052D00851B46C2343A5C054EFCAC4517F"
                        mosaicId: "6BED913FA20223F8"
                        amount: "3995831"
                      - version: 1
                        type: 20803
                        mosaicId: "6BED913FA20223F8"
                        amount: "79916630"
                  id: "69C43AF97A00AE05231CBE6C"
                  meta:
                    timestamp: "158614654107"
              pagination:
                pageNumber: 1
                pageSize: 10
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
