# Todo: This filter will be deprecated in favor of offset once all pagination changes are applied.
name: id
in: query
description: |
  Cursor for pagination. Provide the `id` of the last entry from the previous page
  to fetch the next page.

  The direction depends on the sort order (`orderBy` + `order`):
  - `orderBy=id`, `order=desc`: returns elements with smaller id
    (the "next" page when viewing newest-first).
  - `orderBy=id`, `order=asc`: returns elements with larger id
    (the "next" page when viewing oldest-first).
schema:
  type: string
