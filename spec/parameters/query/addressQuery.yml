name: address
in: query
description: |
  Filter by address. For transaction search: an account's address is considered involved when the account is the sender,
  recipient, or cosigner; this filter cannot be combined with ``recipientAddress`` and ``signerPublicKey``.
  For account, restriction, and lock search: returns entities matching or associated with the address.
schema:
  $ref: "../../schemas/Address.yml"
