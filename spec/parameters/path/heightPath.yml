name: height
in: path
description: |
  Block height in the chain. Each block has a unique height; the nemesis block is 1,
  and each subsequent block increments by one.
required: true
schema:
  $ref: "../../schemas/Height.yml"
examples:
  nemesis:
    summary: Nemesis block (first block)
    value: "1"
  recent:
    summary: Recent block height
    value: "17592"
