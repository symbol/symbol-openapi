type: object
description: Current processing status of a transaction identified by its hash.
required:
  - group
  - deadline
  - hash
properties:
  group:
    $ref: "./TransactionGroupEnum.yml"
  code:
    $ref: "./TransactionStatusEnum.yml"
  hash:
    $ref: "../../../schemas/Hash256.yml"
    description: Hash of the transaction.
  deadline:
    $ref: "../../../schemas/Timestamp.yml"
  height:
    $ref: "../../../schemas/Height.yml"
    description: Block height at which the transaction was confirmed, when available.
