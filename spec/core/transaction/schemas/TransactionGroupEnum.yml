type: string
description: |
  Group that indicates the current processing state of a transaction:
  - `unconfirmed`: the transaction reached the network but is not yet included in a block.
  - `confirmed`: the transaction was included in a block.
  - `partial`: the transaction is waiting for additional cosignatures before it can be confirmed.
  - `failed`: the transaction was rejected during validation.
enum:
  - unconfirmed
  - confirmed
  - failed
  - partial
