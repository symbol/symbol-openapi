tags:
  - Transaction routes
summary: Get unconfirmed transactions information
description: |
  Returns unconfirmed transactions for the list of identifiers in the request body.

  Each request item can be either a transaction ID assigned by the node or a transaction hash.
operationId: getUnconfirmedTransactions
requestBody:
  $ref: "../../../request_bodies/transactionIds.yml"
responses:
  "200":
    description: Unconfirmed transaction information for the requested identifiers.
    content:
      application/json:
        schema:
          type: array
          description: Array of unconfirmed transaction entries.
          items:
            $ref: "../schemas/TransactionInfoDTO.yml"
        examples:
          default:
            summary: Example unconfirmed transaction batch response
            value:
              - meta:
                  height: "0"
                  hash: "E5D72BEE9EF4BFD1F44757E8929E5434E9213DDB63A1783AA061086F2054D719"
                  merkleComponentHash: "E5D72BEE9EF4BFD1F44757E8929E5434E9213DDB63A1783AA061086F2054D719"
                  index: 0
                transaction:
                  size: 328
                  signature: "862748DA2628D09C0D53EF937DC0FB8A52388B287368D105F287320153D1B4B372F0B20A82A5B695FE73BFFEFF..."
                  signerPublicKey: "D3078EDE1559AF366629C81E33CBB2859187A682EADC338C7F79E228959A2CC4"
                  version: 3
                  network: 152
                  type: 16705
                  maxFee: "32800"
                  deadline: "107828961814"
                  transactionsHash: "96596CE7C3DF325418D75014A37606DC5E7D6840D9181D434F29BD9D0655D2C3"
                  cosignatures: []
                id: "69CD73E4C72A61F64A178158"
  "400":
    $ref: "../../../responses/InvalidContent.yml"
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
