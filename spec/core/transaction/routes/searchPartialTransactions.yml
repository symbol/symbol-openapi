tags:
  - Transaction routes
summary: Search partial transactions
description: |
  Returns a paginated list of partial transactions matching the supplied filters.

  Pagination on this endpoint is ordered by transaction record ``id``.
operationId: searchPartialTransactions
parameters:
  - $ref: "../../../parameters/query/addressQuery.yml"
  - $ref: "../../../parameters/query/recipientAddressQuery.yml"
  - $ref: "../../../parameters/query/signerPublicKeyQuery.yml"
  - $ref: "../../../parameters/query/heightQuery.yml"
  - $ref: "../../../parameters/query/fromHeightQuery.yml"
  - $ref: "../../../parameters/query/toHeightQuery.yml"
  - $ref: "../../../parameters/query/fromTransferAmountQuery.yml"
  - $ref: "../../../parameters/query/toTransferAmountQuery.yml"
  - $ref: "../../../parameters/query/transactionTypesQuery.yml"
  - $ref: "../../../parameters/query/embeddedQuery.yml"
  - $ref: "../../../parameters/query/transferMosaicIdQuery.yml"
  - $ref: "../../../parameters/query/pageSizeQuery.yml"
  - $ref: "../../../parameters/query/pageNumberQuery.yml"
  - $ref: "../../../parameters/query/offsetQuery.yml"
  - $ref: "../../../parameters/query/orderQuery.yml"
responses:
  "200":
    description: Page of partial transactions.
    content:
      application/json:
        schema:
          $ref: "../schemas/TransactionPage.yml"
