                    hash: "031FE3A39574F2AC073ACC107A18F175F74ADD0A9CE6C4C5B26AA220986662F0"
                    merkleComponentHash: "031FE3A39574F2AC073ACC107A18F175F74ADD0A9CE6C4C5B26AA220986662F0"
                    index: 0
                  transaction:
                    size: 176
                    signature: "25163A3D6607C900841DC3BF23C5054D47F75D87C22E4143616AA9225D3853DD60FF8DC314DCAC4911CB261B2"
                    signerPublicKey: "A6977B7FF4C3354EFC9393F7EC6F0FBD85A2A649A0B50A06A6A5452629B28006"
                    version: 1
                    network: 104
                    type: 16724
                    maxFee: "17600"
                    deadline: "159220199218"
                    recipientAddress: "68F17F8F3647965E8587F4CADD6B4177213DA8CE3E609EF6"
