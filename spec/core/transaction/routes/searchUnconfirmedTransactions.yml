tags:
  - Transaction routes
summary: Search unconfirmed transactions
description: |
  Returns a paginated list of unconfirmed transactions matching the supplied filters.

  Use this endpoint for transactions accepted by a node but not yet included in a block.
  Use ``searchConfirmedTransactions`` for on-chain transactions, and use
  ``searchPartialTransactions`` for aggregate bonded transactions waiting for cosignatures.

  For cursor-style pagination on this endpoint, set ``offset`` to the ``id`` of the last transaction
  from the previous page. For general pagination strategy guidance, see the ``offset`` and
  ``pageNumber`` query parameter descriptions.
operationId: searchUnconfirmedTransactions
parameters:
  - $ref: "../../../parameters/query/addressQuery.yml"
  - $ref: "../../../parameters/query/recipientAddressQuery.yml"
  - $ref: "../../../parameters/query/signerPublicKeyQuery.yml"
  - $ref: "../../../parameters/query/heightQuery.yml"
  - $ref: "../../../parameters/query/fromHeightQuery.yml"
  - $ref: "../../../parameters/query/toHeightQuery.yml"
  - $ref: "../../../parameters/query/fromTransferAmountQuery.yml"
  - $ref: "../../../parameters/query/toTransferAmountQuery.yml"
  - $ref: "../../../parameters/query/transactionTypesQuery.yml"
  - $ref: "../../../parameters/query/embeddedQuery.yml"
  - $ref: "../../../parameters/query/transferMosaicIdQuery.yml"
  - $ref: "../../../parameters/query/pageSizeQuery.yml"
  - $ref: "../../../parameters/query/pageNumberQuery.yml"
  - $ref: "../../../parameters/query/offsetQuery.yml"
  - $ref: "../../../parameters/query/orderQuery.yml"
responses:
  "200":
    description: Page of unconfirmed transactions.
    content:
      application/json:
        schema:
          $ref: "../schemas/TransactionPage.yml"
