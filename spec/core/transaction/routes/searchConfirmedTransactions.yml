  - $ref: "../../../parameters/query/fromHeightQuery.yml"
  - $ref: "../../../parameters/query/toHeightQuery.yml"
  - $ref: "../../../parameters/query/fromTransferAmountQuery.yml"
  - $ref: "../../../parameters/query/toTransferAmountQuery.yml"
  - $ref: "../../../parameters/query/transactionTypesQuery.yml"
  - $ref: "../../../parameters/query/embeddedQuery.yml"
  - $ref: "../../../parameters/query/transferMosaicIdQuery.yml"
  - $ref: "../../../parameters/query/pageSizeQuery.yml"
  - $ref: "../../../parameters/query/pageNumberQuery.yml"
  - $ref: "../../../parameters/query/offsetQuery.yml"
  - $ref: "../../../parameters/query/orderQuery.yml"
