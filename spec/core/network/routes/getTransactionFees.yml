tags:
  - Network routes
summary: Get transaction fees information
description: |
  Returns the average, median, highest, and lowest fee multiplier over the last ``numBlocksTransactionFeeStats`` blocks.
  The setting ``numBlocksTransactionFeeStats`` is adjustable in the REST configuration file (``rest.json``) per REST instance.
operationId: getTransactionFees
responses:
  "200":
    description: Transaction fees successfully retrieved.
    content:
      application/json:
        schema:
          $ref: "../schemas/TransactionFeesDTO.yml"
        examples:
          transactionFees:
            summary: Mainnet transaction fees example
            value:
              averageFeeMultiplier: 103
              medianFeeMultiplier: 100
              highestFeeMultiplier: 1136
              lowestFeeMultiplier: 0
              minFeeMultiplier: 10
