tags:
  - Network routes
summary: Get the current network type of the chain
description: Returns the current network type.
operationId: getNetworkType
responses:
  "200":
    description: Network type successfully retrieved.
    content:
      application/json:
        schema:
          $ref: "../schemas/NetworkTypeDTO.yml"
        examples:
          mainnet:
            summary: Mainnet
            value:
              name: mainnet
              description: Symbol Mainnet
          testnet:
            summary: Testnet
            value:
              name: testnet
              description: Symbol Testnet
