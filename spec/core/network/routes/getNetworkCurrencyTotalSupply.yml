tags:
  - Network routes
summary: Returns total currency supply
description: |
  Returns the total current on-chain supply of the network currency mosaic.
  
  Data sources:
    - Mosaic supply and divisibility from blockchain state
  
  This value includes both circulating and uncirculating balances and represents
  the full issued supply currently recorded on-chain.

operationId: getTotalCurrencySupply
responses:
  "200":
    description: |
      Successful response containing the total currency supply.
      
      The value is expressed in whole units with a fractional part
      determined by the mosaic divisibility and returned as a fixed-decimal string.
    content:
      text/plain:
        schema:
          type: string
          pattern: '^\d+\.\d+$'
          examples:
            - "7842928625.000000"
