tags:
  - Network routes
summary: Returns circulating currency supply
description: |
  Returns the current circulating supply of the network currency mosaic.
  
  Circulating supply represents the portion of total on-chain supply that is not held in 
  designated uncirculating or reserved accounts (e.g. nemesis or treasury accounts).
  
  Data sources:
    • Mosaic supply and divisibility from blockchain database
    • Nemesis signer public key from network properties file
    • Uncirculating account public keys defined in rest.json (`uncirculatingAccountPublicKeys`)
  
  The result reflects real-time chain state and is formatted according to the mosaic divisibility.
operationId: getCirculatingCurrencySupply
responses:
  "200":
    description: Successful response containing the circulating currency supply as fixed-decimal string.
    content:
      text/plain:
        schema:
          schema:
            type: string
            pattern: '^\d+\.\d{1,6}$'
            example: "6351335211.744781"
