type: object
description: |
  One entry in the inflation schedule: block height from which a reward amount applies, and the reward amount.
required:
  - startHeight
  - rewardAmount
properties:
  startHeight:
    $ref: "../../../schemas/Height.yml"
    description: Block height at which this reward amount becomes active.
    examples:
      - 10
  rewardAmount:
    $ref: "../../../schemas/Amount.yml"
    description: Inflation reward per block in smallest (atomic) units of the network currency.
    examples:
      - 20500000
