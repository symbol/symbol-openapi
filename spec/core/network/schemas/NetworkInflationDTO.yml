type: object
description: |
  One entry in the inflation schedule: block height from which a reward amount applies,
  and the reward amount in atomic units.
required:
  - startHeight
  - rewardAmount
properties:
  startHeight:
    $ref: "../../../schemas/Height.yml"
    description: Block height at which this reward amount becomes active.
    examples:
      - 10
  rewardAmount:
    type: string
    description: Amount of inflationary rewards available from this block height.
    examples:
      - 20500000
