tags:
  - Chain routes
summary: Get chain information
description: |
  Returns the current state of the blockchain: chain height, chain score, and the
  latest finalized block.
operationId: getChainInfo
responses:
  "200":
    description: Chain information successfully retrieved.
    content:
      application/json:
        schema:
          $ref: "../schemas/ChainInfoDTO.yml"
        examples:
          chainInfo:
            summary: Chain info example
            value:
              height: "5270371"
              scoreHigh: "35"
              scoreLow: "9355904769811254014"
              latestFinalizedBlock:
                finalizationEpoch: 3661
                finalizationPoint: 68
                height: "5270348"
                hash: C219E4BBF8347AE5943BCB4B7D583BE4D7ED55DD6F4D2CD0A018F0D5A6AE0D86
