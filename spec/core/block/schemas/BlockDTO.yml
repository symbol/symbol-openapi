type: object
description: |
  Block header data. Contains the height, timestamp, difficulty, VRF proof,
  hashes linking to the previous block, transactions, receipts, and state,
  as well as the beneficiary address and fee multiplier.
  The harvester is identified by `signerPublicKey`; `beneficiaryAddress` is the optional reward recipient.
allOf:
  - $ref: "../../entity/schemas/SizePrefixedEntityDTO.yml"
  - $ref: "../../entity/schemas/VerifiableEntityDTO.yml"
  - $ref: "../../entity/schemas/EntityDTO.yml"
  - type: object
    required:
      - height
      - timestamp
      - difficulty
      - proofGamma
      - proofVerificationHash
      - proofScalar
      - previousBlockHash
      - transactionsHash
      - receiptsHash
      - stateHash
      - beneficiaryAddress
      - feeMultiplier
    properties:
      height:
        $ref: "../../../schemas/Height.yml"
      timestamp:
        $ref: "../../../schemas/Timestamp.yml"
      difficulty:
        $ref: "../../../schemas/Difficulty.yml"
      proofGamma:
        $ref: "../../../schemas/ProofGamma.yml"
      proofVerificationHash:
        $ref: "../../../schemas/ProofVerificationHash.yml"
      proofScalar:
        $ref: "../../../schemas/ProofScalar.yml"
      previousBlockHash:
        $ref: "../../../schemas/Hash256.yml"
      transactionsHash:
        $ref: "../../../schemas/Hash256.yml"
        description: Merkle root hash of the transactions in this block.
      receiptsHash:
        $ref: "../../../schemas/Hash256.yml"
        description: Merkle root hash of the receipts generated by this block.
      stateHash:
        $ref: "../../../schemas/Hash256.yml"
        description: Hash of the global chain state at this block.
      beneficiaryAddress:
        $ref: "../../../schemas/AddressHex.yml"
        description: |
          Address of the optional beneficiary designated by the harvester. Returned as 48-character hex (24 bytes).
      feeMultiplier:
        $ref: "../../../schemas/BlockFeeMultiplier.yml"
