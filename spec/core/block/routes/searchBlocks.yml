tags:
  - Block routes
summary: Search blocks
description: |
  Returns a paginated list of blocks matching the given criteria.

  Results can be filtered by harvester (``signerPublicKey``), beneficiary address,
  and timestamp range. Standard pagination parameters (``pageSize``, ``pageNumber``,
  ``offset``, ``order``) apply.
  The ``orderBy`` parameter supports ``id`` and ``height``. The ``offset`` value must match the ``orderBy`` field.
operationId: searchBlocks
parameters:
  - $ref: "../../../parameters/query/signerPublicKeyQuery.yml"
  - $ref: "../../../parameters/query/beneficiaryAddressQuery.yml"
  - $ref: "../../../parameters/query/pageSizeQuery.yml"
  - $ref: "../../../parameters/query/pageNumberQuery.yml"
  - $ref: "../../../parameters/query/offsetQuery.yml"
  - $ref: "../../../parameters/query/orderQuery.yml"
  - $ref: "../../../parameters/query/orderByBlockQuery.yml"
  - $ref: "../../../parameters/query/fromTimestampQuery.yml"
  - $ref: "../../../parameters/query/toTimestampQuery.yml"
responses:
