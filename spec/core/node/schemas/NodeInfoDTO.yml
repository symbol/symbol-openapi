type: object
description: |
  Identity and configuration of the connected node: version, public key, network
  generation hash, roles (peer/api/voting), host, port, and friendly name.
required:
  - version
  - publicKey
  - networkGenerationHashSeed
  - roles
  - port
  - networkIdentifier
  - friendlyName
  - host
properties:
  version:
    type: integer
    description: Version of the application.
    examples:
      - 16777993
  publicKey:
    $ref: "../../../schemas/PublicKey.yml"
  networkGenerationHashSeed:
    $ref: "../../../schemas/Hash256.yml"
  roles:
    $ref: "./RolesTypeEnum.yml"
  port:
    type: integer
    description: Port used for the communication.
    examples:
      - 7900
  networkIdentifier:
    $ref: "../../entity/schemas/NetworkTypeEnum.yml"
  friendlyName:
    type: string
    description: Node friendly name.
    examples:
      - api-node-0
  host:
    type: string
    description: Node IP address.
    examples:
      - 127.0.0.1
  nodePublicKey:
    $ref: "../../../schemas/PublicKey.yml"
