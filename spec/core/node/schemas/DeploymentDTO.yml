type: object
description: |
  Deployment tool and version used to create/maintain the node; date of last upgrade.
required:
  - deploymentTool
  - deploymentToolVersion
  - lastUpdatedDate
properties:
  deploymentTool:
    type: string
    examples:
      - 'symbol-bootstrap'
    description: "The tool used to create, maintain and deploy the node. Examples: ``symbol-bootstrap``, ``manual``."
  deploymentToolVersion:
    type: string
    examples:
      - '1.0.6'
    description: "The version of the tool used to create, maintain and deploy the node."
  lastUpdatedDate:
    type: string
    examples:
      - '2021-06-02'
    description: "When was the node last upgraded."
