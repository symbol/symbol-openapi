type: object
description: |
  Storage statistics: number of blocks, transactions, and accounts stored
  by the node.
required:
  - numBlocks
  - numTransactions
  - numAccounts
properties:
  numBlocks:
    type: integer
    description: Number of blocks stored.
    examples:
      - 245053
  numTransactions:
    type: integer
    description: Number of transactions stored.
    examples:
      - 58590
  numAccounts:
    type: integer
    description: Number of accounts created.
    examples:
      - 177
