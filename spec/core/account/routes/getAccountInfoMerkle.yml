tags:
  - Account routes
summary: Get account Merkle information
description: |
  Retrieves the Merkle proof data for a given account.
  The Merkle path can be used to independently verify that the account state is included
  in the block state hash.

  The ``accountId`` path parameter accepts either a public key or a Base32-encoded address.
operationId: getAccountInfoMerkle
parameters:
  - $ref: "../../../parameters/path/accountIdPath.yml"
responses:
  "200":
    description: Account Merkle information successfully retrieved.
    content:
      application/json:
        schema:
          $ref: "../../../schemas/MerkleStateInfoDTO.yml"
        examples:
          default:
            value:
              raw: 00008080DA9B4AF63BE985715EA635AF98E3CF3B0A22F9A2BE1C7DD40B79948AA63E36586E5D2E9D0C089C1C64BC0D42...
              tree: []
  "404":
    $ref: "../../../responses/ResourceNotFound.yml"
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
