tags:
  - Account routes
summary: Get account information
description: |
  Retrieves account data for a given account identifier.
  The response contains the account state including balance, importance, public key, linked keys, and activity buckets.

  The ``accountId`` path parameter accepts either a public key or a Base32-encoded address.
operationId: getAccountInfo
parameters:
  - $ref: "../../../parameters/path/accountIdPath.yml"
responses:
  "200":
    description: Account information successfully retrieved.
    content:
      application/json:
        schema:
          $ref: "../schemas/AccountInfoDTO.yml"
        examples:
          default:
            value:
              id: "5E62690AB46E5565E8C0B5B5"
              account:
                version: 1
                address: "985A3B9B3A5821E7E5D6E7F8A9B0C1D2E3F4A5B6C7D8E9F0"
                addressHeight: "1"
                publicKey: AC1A6E1D8DE5B17D2C6B1293F1CAD3829EEACF38D09311BB3C8E5A880092DE26
                publicKeyHeight: "1"
                accountType: 0
                supplementalPublicKeys: {}
                activityBuckets:
                  - startHeight: "1"
                    totalFeesPaid: "0"
                    beneficiaryCount: 0
                    rawScore: "0"
                mosaics:
                  - id: 0DC67FBE1CAD29E3
                    amount: "1000000"
                importance: "0.010263666447108395"
                importanceHeight: "1"
  "404":
    $ref: "../../../responses/ResourceNotFound.yml"
  "409":
    $ref: "../../../responses/InvalidArgument.yml"
