type: object
description: Voting key linked to the account, valid for a range of finalization epochs.
required:
  - publicKey
  - startEpoch
  - endEpoch
properties:
  publicKey:
    $ref: "../../../schemas/PublicKey.yml"
  startEpoch:
    $ref: "../../../schemas/FinalizationEpoch.yml"
    description: First finalization epoch for which this key is valid.
  endEpoch:
    $ref: "../../../schemas/FinalizationEpoch.yml"
    description: Last finalization epoch for which this key is valid.
