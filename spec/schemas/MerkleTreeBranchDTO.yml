type: object
description: |
  Internal node of a [Patricia Merkle tree](https://docs.symbol.dev/concepts/data-validation.html)
  used in state proofs. A branch has up to 16 child links (one per nibble 0–F) and a path prefix.
required:
  - type
  - path
  - encodedPath
  - nibbleCount
  - linkMask
  - links
  - branchHash
properties:
  type:
    description: Node type (always branch).
    $ref: "./MerkleTreeNodeTypeEnum.yml"
  path:
    description: Path prefix (hex) from root to this branch.
    type: string
  encodedPath:
    description: Compact-encoded path.
    type: string
  nibbleCount:
    description: Number of nibbles in the path.
    type: integer
  linkMask:
    description: Bitmask indicating which nibble slots (0–15) have child links.
    type: string
  links:
    description: Child links (max 16, one per nibble).
    type: array
    items:
      $ref: "./MerkleTreeBranchLinkDTO.yml"
  branchHash:
    description: SHA3-256 hash of the branch node (64-character hex).
    $ref: "./Hash256.yml"