type: object
description: |
  Child link in a [Merkle tree branch](https://docs.symbol.dev/concepts/data-validation.html)
  node. Each link points to a child node (branch or leaf) via its hash.
required:
  - bit
  - link
properties:
  bit:
    description: Nibble index (0–15) identifying this child slot.
    type: string
  link:
    description: Hash of the child node (64-character hex).
    $ref: "./Hash256.yml"
    