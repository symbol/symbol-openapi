type: object
description: |
  Terminal node of a [Patricia Merkle tree](https://docs.symbol.dev/concepts/data-validation.html)
  used in state proofs. A leaf stores the final path and the associated value (entity state hash).
required:
  - type
  - path
  - encodedPath
  - nibbleCount
  - value
  - leafHash
properties:
  type:
    description: Node type (always leaf).
    $ref: "./MerkleTreeNodeTypeEnum.yml"
  path:
    description: Full path (hex) from root to this leaf.
    type: string
  encodedPath:
    description: Compact-encoded path.
    type: string
  nibbleCount:
    description: Number of nibbles in the path.
    type: integer
  value:
    description: Leaf value (SHA3-256 hash of the entity state).
    type: string
  leafHash:
    description: SHA3-256 hash of the leaf node (64-character hex).
    $ref: "./Hash256.yml"
