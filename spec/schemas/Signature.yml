type: string
description: |
  64-byte Ed25519 signature (128 hex characters). Generated by the signer using their private key
  over the serialized entity payload. Can be verified with the signer's public key (`signerPublicKey`).
  Used for blocks, transactions, and cosignatures.
format: hex
examples:
  - 4B408BBEDF25F2AC8E0E44A6E51E3CCBA03885902055F75EB9FF50433532CA44BF9175FDA7502EEE2FC1617126E453A2BD692BAFDAAF06BC8EDEBA7961B3730D
